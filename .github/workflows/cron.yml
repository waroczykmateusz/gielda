name: Cron Jobs

on:
  schedule:
    - cron: '*/15 7-16 * * 1-5'  # alerts every 15min, 09:00-18:00 PL (07:00-16:00 UTC)
    - cron: '0 6 * * 1-5'         # morning AI analysis — 08:00 PL (CEST)
    - cron: '0 8 * * 1-5'         # signals 10:00 PL
    - cron: '0 12 * * 1-5'        # signals 14:00 PL
    - cron: '6 15 * * 1-5'        # daily report — 17:06 PL
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'alerts'
        type: choice
        options:
          - alerts
          - morning
          - signals
          - report

jobs:
  alerts:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'alerts' ||
      github.event_name == 'schedule' && (
        github.event.schedule == '*/15 7-16 * * 1-5'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Call alerts endpoint
        run: |
          curl -sf -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/alerts" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_TOKEN }}"

  morning:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'morning' ||
      github.event_name == 'schedule' && github.event.schedule == '0 6 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Call morning endpoint
        run: |
          curl -s -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/morning" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_TOKEN }}"

  signals-10:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'signals' ||
      github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Call signals endpoint (10:00)
        run: |
          curl -sf -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/signals" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_TOKEN }}"

  signals-14:
    if: >
      github.event_name == 'schedule' && github.event.schedule == '0 12 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Call signals endpoint (14:00)
        run: |
          curl -sf -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/signals" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_TOKEN }}"

  report:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'report' ||
      github.event_name == 'schedule' && github.event.schedule == '6 15 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Call report endpoint
        run: |
          curl -sf -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/report" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_TOKEN }}"
