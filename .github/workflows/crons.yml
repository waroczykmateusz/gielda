name: Cron jobs

on:
  schedule:
    - cron: "0 6 * * 1-5"    # morning:    08:00 CEST (pon-pt)
    - cron: "6 15 * * 1-5"   # gpw_close:  17:06 CEST (pon-pt)
    - cron: "0 20 * * 1-5"   # usa_close:  22:00 CEST (pon-pt)
  workflow_dispatch:
    inputs:
      job:
        description: "Który job uruchomić"
        required: true
        type: choice
        options: [morning, gpw_close, usa_close]

jobs:
  morning:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'morning' || github.event_name == 'schedule' && startsWith(github.event.schedule, '0 6')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger morning
        run: |
          curl -sf -X GET "https://gielda-mati4.vercel.app/api/cron/morning" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  gpw_close:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'gpw_close' || github.event_name == 'schedule' && startsWith(github.event.schedule, '6 15')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger gpw_close
        run: |
          curl -sf -X GET "https://gielda-mati4.vercel.app/api/cron/gpw_close" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  usa_close:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'usa_close' || github.event_name == 'schedule' && startsWith(github.event.schedule, '0 20')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger usa_close
        run: |
          curl -sf -X GET "https://gielda-mati4.vercel.app/api/cron/usa_close" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
